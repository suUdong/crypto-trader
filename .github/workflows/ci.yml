name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src
      - name: Unit tests
        run: python -m unittest discover -s tests -t . -v
