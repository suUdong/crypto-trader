name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy, warnings only)
        run: mypy src/
        continue-on-error: true

      - name: Test (whitelist)
        run: |
          pytest \
            tests/test_risk_hardening.py \
            tests/test_risk_manager.py \
            tests/test_kill_switch.py \
            tests/test_kill_switch_consecutive.py \
            tests/test_kill_switch_runtime.py \
            tests/test_pipeline.py \
            tests/test_runtime.py \
            tests/test_runtime_state.py \
            tests/test_multi_symbol.py \
            tests/test_wallet.py \
            tests/test_wallet_health.py \
            tests/test_wallet_performance.py \
            tests/test_capital_allocator.py \
            tests/test_config.py \
            tests/test_paper_broker.py \
            tests/test_live_broker.py \
            tests/test_broker_selection.py \
            tests/test_daemon_heartbeat.py \
            tests/test_daemon_supervisor.py \
            tests/test_circuit_breaker.py \
            tests/test_cooldown.py \
            tests/test_watchdog.py \
