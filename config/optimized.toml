# Auto-tuned configuration — Session #8
# Updated with Session #7 features: ADX filter, volume filter, cooldown,
# partial take-profit, trailing after partial TP, time-decay exit,
# weighted consensus voting, adaptive RSI ceiling
# Capital rebalanced: winners get more, losers get less

[trading]
exchange = "upbit"
interval = "minute60"
paper_trading = true
symbols = ["KRW-BTC", "KRW-ETH", "KRW-XRP", "KRW-SOL"]

[strategy]
max_holding_bars = 48
momentum_entry_threshold = 0.003
momentum_lookback = 15
rsi_overbought = 75.0
rsi_period = 14
adx_period = 14
adx_threshold = 20.0
volume_filter_mult = 0.0

[risk]
atr_stop_multiplier = 2.0
risk_per_trade_pct = 0.015
stop_loss_pct = 0.03
take_profit_pct = 0.04
trailing_stop_pct = 0.0
partial_tp_pct = 0.5
cooldown_bars = 3

[kill_switch]
max_portfolio_drawdown_pct = 0.15
max_daily_loss_pct = 0.05
max_consecutive_losses = 5
max_strategy_drawdown_pct = 0.10
cooldown_minutes = 60

# === Winner Tier: Heavy allocation ===

# momentum: Sharpe=1.34 Return=+4.80% — FLAGSHIP STRATEGY
[[wallets]]
name = "momentum_wallet"
strategy = "momentum"
initial_capital = 2000000.0

[wallets.strategy_overrides]
max_holding_bars = 48
momentum_entry_threshold = 0.003
momentum_lookback = 15
rsi_overbought = 75.0
rsi_period = 14
adx_period = 14
adx_threshold = 20.0
volume_filter_mult = 1.2

[wallets.risk_overrides]
atr_stop_multiplier = 2.0
risk_per_trade_pct = 0.015
stop_loss_pct = 0.03
take_profit_pct = 0.04
trailing_stop_pct = 0.0
partial_tp_pct = 0.5
cooldown_bars = 3
max_concurrent_positions = 2

# kimchi_premium: Sharpe=1.22 Return=+5.29% WR=51% — BEST WIN RATE
[[wallets]]
name = "kimchi_premium_wallet"
strategy = "kimchi_premium"
initial_capital = 1500000.0

[wallets.strategy_overrides]
max_holding_bars = 24
min_confidence = 0.4
min_trade_interval_bars = 6
rsi_overbought = 75.0
rsi_period = 14
rsi_recovery_ceiling = 50.0

[wallets.risk_overrides]
atr_stop_multiplier = 3.0
risk_per_trade_pct = 0.01
stop_loss_pct = 0.02
take_profit_pct = 0.04
trailing_stop_pct = 0.0
partial_tp_pct = 0.5
cooldown_bars = 3
max_concurrent_positions = 2

# consensus: NEW — multi-strategy agreement filter for higher-quality entries
[[wallets]]
name = "consensus_wallet"
strategy = "consensus"
initial_capital = 1500000.0

[wallets.strategy_overrides]
max_holding_bars = 36
momentum_entry_threshold = 0.003
momentum_lookback = 15
rsi_overbought = 75.0
rsi_period = 14
adx_period = 14
adx_threshold = 20.0
sub_strategies = ["momentum", "kimchi_premium"]
min_agree = 2
min_confidence_sum = 1.2

[wallets.risk_overrides]
atr_stop_multiplier = 2.0
risk_per_trade_pct = 0.01
stop_loss_pct = 0.03
take_profit_pct = 0.05
trailing_stop_pct = 0.0
partial_tp_pct = 0.5
cooldown_bars = 3
max_concurrent_positions = 2

# composite: Sharpe=1.16 — stable but low frequency
[[wallets]]
name = "composite_wallet"
strategy = "composite"
initial_capital = 1000000.0

[wallets.strategy_overrides]
bollinger_stddev = 1.8
bollinger_window = 20
max_holding_bars = 36
momentum_entry_threshold = 0.008
momentum_lookback = 20
rsi_period = 14
rsi_recovery_ceiling = 55.0
adx_period = 14
adx_threshold = 20.0

[wallets.risk_overrides]
