# Auto-tuned configuration
# Generated from grid search optimization
# Best strategy in evaluated candidate sweep: momentum
# Avg Sharpe: 1.34

[kill_switch]
max_portfolio_drawdown_pct = 0.15
max_daily_loss_pct = 0.05
max_consecutive_losses = 5
max_strategy_drawdown_pct = 0.10
cooldown_minutes = 60

[trading]
exchange = "upbit"
interval = "minute60"
paper_trading = true
symbols = ["KRW-BTC", "KRW-ETH", "KRW-XRP", "KRW-SOL"]

[strategy]
max_holding_bars = 48
momentum_entry_threshold = 0.003
momentum_lookback = 15
rsi_overbought = 75.0
rsi_period = 14

[risk]
atr_stop_multiplier = 0.0
risk_per_trade_pct = 0.015
stop_loss_pct = 0.03
take_profit_pct = 0.04
trailing_stop_pct = 0.0

# Optimized wallet allocation

# momentum: Sharpe=1.34 Return=+4.80% MDD=7.53% WR=37.9% PF=1.23 Trades=306
[[wallets]]
name = "momentum_wallet"
strategy = "momentum"
initial_capital = 1000000.0

[wallets.strategy_overrides]
