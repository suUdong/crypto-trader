# Auto-tuned configuration
# Generated from grid search optimization
# Best strategy in evaluated candidate sweep: momentum
# Avg Sharpe: 4.22

[trading]
exchange = "upbit"
interval = "minute60"
paper_trading = true
symbols = ["KRW-BTC", "KRW-ETH", "KRW-XRP", "KRW-SOL"]

[strategy]
max_holding_bars = 36
momentum_entry_threshold = 0.008
momentum_lookback = 15
rsi_overbought = 65.0
rsi_period = 18

[risk]
atr_stop_multiplier = 0.0
risk_per_trade_pct = 0.01
stop_loss_pct = 0.03
take_profit_pct = 0.08
trailing_stop_pct = 0.0

# Optimized wallet allocation

# momentum: Sharpe=4.22 Return=+4.23% MDD=2.28% WR=0.0% PF=2.26 Trades=111
[[wallets]]
name = "momentum_wallet"
strategy = "momentum"
initial_capital = 1000000.0

[wallets.strategy_overrides]
max_holding_bars = 36
momentum_entry_threshold = 0.008
momentum_lookback = 15
rsi_overbought = 65.0
rsi_period = 18

[wallets.risk_overrides]
atr_stop_multiplier = 0.0
risk_per_trade_pct = 0.01
stop_loss_pct = 0.03
take_profit_pct = 0.08
