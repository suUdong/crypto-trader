# Production daemon config — walk-forward validated + grid-search optimized
# Deployed: 2026-03-26
# Strategies: momentum (Sharpe 1.91 WF) + kimchi_premium (Sharpe 1.22 GS)
# Excluded: mean_reversion(-1.51), vpin(-1.86), volatility_breakout(-2.25), obi(-2.33)

[trading]
exchange = "upbit"
symbol = "KRW-BTC"
symbols = ["KRW-BTC", "KRW-ETH", "KRW-XRP", "KRW-SOL"]
interval = "minute60"
candle_count = 200
paper_trading = true

# Global strategy params — tuned for momentum (walk-forward fold 2)
[strategy]
momentum_lookback = 15
momentum_entry_threshold = 0.008
momentum_exit_threshold = -0.01
bollinger_window = 20
bollinger_stddev = 1.8
rsi_period = 18
rsi_oversold_floor = 20.0
rsi_recovery_ceiling = 60.0
rsi_overbought = 65.0
max_holding_bars = 36

[regime]
short_lookback = 10
long_lookback = 30
bull_threshold_pct = 0.03
bear_threshold_pct = -0.03

[drift]
bull_return_tolerance_pct = 0.15
sideways_return_tolerance_pct = 0.08
bear_return_tolerance_pct = 0.05
bull_error_rate_threshold = 0.25
sideways_error_rate_threshold = 0.20
bear_error_rate_threshold = 0.10

# Risk — momentum walk-forward fold 2 optimal
[risk]
risk_per_trade_pct = 0.01
stop_loss_pct = 0.03
take_profit_pct = 0.10
max_daily_loss_pct = 0.05
max_concurrent_positions = 4
trailing_stop_pct = 0.0
atr_stop_multiplier = 0.0
min_entry_confidence = 0.5

[backtest]
initial_capital = 1000000.0
fee_rate = 0.0005
slippage_pct = 0.0005

[telegram]
bot_token = ""
chat_id = ""

[runtime]
log_level = "INFO"
poll_interval_seconds = 60
max_iterations = 0
daemon_mode = true
healthcheck_path = "artifacts/health.json"
runtime_checkpoint_path = "artifacts/runtime-checkpoint.json"
backtest_baseline_path = "artifacts/backtest-baseline.json"
regime_report_path = "artifacts/regime-report.json"
drift_calibration_path = "artifacts/drift-calibration.json"
operator_report_path = "artifacts/operator-report.md"
strategy_run_journal_path = "artifacts/strategy-runs.jsonl"
paper_trade_journal_path = "artifacts/paper-trades.jsonl"
position_snapshot_path = "artifacts/positions.json"
daily_performance_path = "artifacts/daily-performance.json"
drift_report_path = "artifacts/drift-report.json"
promotion_gate_path = "artifacts/promotion-gate.json"
daily_memo_path = "artifacts/daily-memo.md"
strategy_report_path = "artifacts/strategy-report.md"

# --- Wallets (positive Sharpe only) ---

[[wallets]]
name = "momentum_wallet"
strategy = "momentum"
initial_capital = 1_000_000.0
symbols = ["KRW-BTC", "KRW-ETH"]
# BTC +1.37% ETH +7.05% — XRP/SOL excluded (negative returns in 90d backtest)

[[wallets]]
name = "kimchi_premium_wallet"
strategy = "kimchi_premium"
initial_capital = 1_000_000.0
symbols = ["KRW-BTC", "KRW-ETH", "KRW-XRP", "KRW-SOL"]
# Per-wallet overrides from 90-day grid search (Sharpe 1.22, WR 51%, PF 1.49)
[wallets.strategy_overrides]
rsi_period = 14
rsi_recovery_ceiling = 50.0
rsi_overbought = 75.0
max_holding_bars = 24
min_trade_interval_bars = 6
min_confidence = 0.4
cooldown_hours = 6.0
[wallets.risk_overrides]
stop_loss_pct = 0.02
take_profit_pct = 0.04
atr_stop_multiplier = 3.0

[credentials]
upbit_access_key = ""
upbit_secret_key = ""
