# vpin_eth_wallet: ONLY profitable wallet (+₩2,406, 33% WR)
# P0 CONCENTRATION: ₩5.7M full allocation, tightened for 50%+ WR target
# KEY CHANGES from R3:
#   - Capital: 1.7M → 5.7M (100% of portfolio)
#   - vpin_low_threshold: 0.4 → 0.35 (require cleaner order flow for entry)
#   - vpin_momentum_threshold: 0.0003 → 0.0005 (stronger momentum confirmation)
#   - vpin_rsi_ceiling: 70 → 65 (avoid entries near overbought)
#   - max_holding_bars: 24 → 18 (cut losers faster)
#   - min_entry_confidence: 0.65 → 0.70 (global, higher selectivity)
#   - stop_loss_pct: 0.015 → 0.012 (tighter stop, less per-trade loss)
#   - cooldown_bars: 3 → 4 (more spacing between trades)
[[wallets]]
name = "vpin_eth_wallet"
strategy = "vpin"
initial_capital = 5_700_000.0
symbols = ["KRW-ETH"]
[wallets.strategy_overrides]
rsi_period = 14
momentum_lookback = 8
max_holding_bars = 18
vpin_low_threshold = 0.35
vpin_high_threshold = 0.7
vpin_momentum_threshold = 0.0005
vpin_rsi_ceiling = 65.0
vpin_rsi_floor = 20.0
rsi_overbought = 75.0
bucket_count = 24
ema_trend_period = 20
adx_threshold = 15.0
[wallets.risk_overrides]
stop_loss_pct = 0.012
take_profit_pct = 0.04
risk_per_trade_pct = 0.01
partial_tp_pct = 0.5
cooldown_bars = 4
atr_stop_multiplier = 3.0

