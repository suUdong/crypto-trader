# === Capital Allocation Summary (P0 optimization rebalance, 2026-03-29) ===
# Equity ₩5.7M — diversified across 3 wallets based on 90d backtest optimization
#
# ACTIVE (P0 optimized):
#   vpin_eth:        3,500,000 (61.4%) — Sharpe 1.11, WR 60%, MDD 0.10%
#   momentum_sol:    1,200,000 (21.1%) — Sharpe 1.55, WR 50%, MDD 0.46%
#   volspike_btc:    1,000,000 (17.5%) — spike_mult 2.0, Sharpe 0.66, WR 47%, 15 trades/90d
# TOTAL:           5,700,000
#
# P0 OPTIMIZATION RATIONALE:
#   - ATR multiplier has near-zero impact (exits via RSI/momentum, not ATR stops)
#   - Lower confidence (0.45) outperforms 0.6-0.8 — more trades, same quality
#   - Re-enabled momentum_sol + volspike_btc: strong backtest Sharpe justifies allocation
#   - vpin_eth remains anchor but no longer 100% concentrated
#   - Key param changes: ATR 2.5→1.5, confidence 0.70→0.45, vpin_eth hold 18→24 bars
#
# DISABLED:
#   momentum_eth: paper -₩6,353, 0% WR — re-enable when F&G>30
#   vpin_sol: backtest Sharpe 0.53 (below target) — keep sidelined
#   vbreak_xrp: live -0.119% — keep sidelined
#   mean_reversion_weekend: live -0.051% — too weak
#
# WIN RATE TUNING (33% → 50%+ target):
#   - vpin_low 0.4→0.35: require cleaner order flow
#   - momentum threshold 0.0003→0.0005: stronger trend confirmation
#   - RSI ceiling 70→65: avoid near-overbought entries
#   - max_holding 24→18 bars: cut losers sooner
#   - confidence 0.65→0.70: higher selectivity
#   - stop_loss 1.5%→1.2%: tighter risk per trade
#   - cooldown 3→4 bars: more spacing
#
# NEXT: validate with backtest optimizer, monitor paper for 48h
