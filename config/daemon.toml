# --- Consensus wallet (multi-strategy agreement filter) ---

[[wallets]]
name = "consensus_btc_wallet"
strategy = "consensus"
initial_capital = 1_000_000.0
symbols = ["KRW-BTC"]
# Enters when momentum, vpin, or volume_spike signals — wider net with multi-strategy exit safety
[wallets.strategy_overrides]
sub_strategies = ["momentum", "vpin", "volume_spike"]
weights = [1.0, 1.0, 0.8]
min_agree = 1
momentum_lookback = 12
momentum_entry_threshold = 0.0005
rsi_period = 14
rsi_recovery_ceiling = 70.0
adx_threshold = 12.0
max_holding_bars = 48
# VPIN sub-strategy: relaxed thresholds for consensus context
vpin_momentum_threshold = 0.001
vpin_low_threshold = 0.50
vpin_rsi_ceiling = 75.0
# Volume spike sub-strategy: lower spike for sideways market signal frequency
spike_mult = 1.5
min_body_ratio = 0.3
[wallets.risk_overrides]
stop_loss_pct = 0.03
take_profit_pct = 0.08
risk_per_trade_pct = 0.015

