# Production daemon config — ROI-focused active-wallet rebalance (2026-03-28)
# Source: live checkpoint equity ₩5.7M + active-wallet 90d ROI benchmark
# Wallets: 5 active sleeves, keeping live-negative vbreak_xrp / mean_reversion_weekend disabled.
# Capital rotated toward the highest active ROI sleeves while keeping volspike capped for low sample count.
# Excluded: funding_rate / ema_crossover / consensus (research-only)

[trading]
exchange = "upbit"
symbol = "KRW-BTC"
symbols = ["KRW-BTC", "KRW-ETH", "KRW-XRP", "KRW-SOL"]
interval = "minute60"
candle_count = 200
paper_trading = true
# Staged rollout: only these wallets go live when paper_trading=false.
# Empty list = all wallets go live. Start with smallest wallet first.
go_live_wallets = ["vpin_eth_wallet"]

[strategy]
momentum_lookback = 12
momentum_entry_threshold = 0.001
momentum_exit_threshold = -0.01
bollinger_window = 20
bollinger_stddev = 1.8
rsi_period = 14
rsi_oversold_floor = 20.0
rsi_recovery_ceiling = 75.0
rsi_overbought = 72.0
max_holding_bars = 36
adx_threshold = 20.0

[regime]
short_lookback = 10
long_lookback = 30
bull_threshold_pct = 0.03
bear_threshold_pct = -0.03

[drift]
bull_return_tolerance_pct = 0.15
sideways_return_tolerance_pct = 0.08
bear_return_tolerance_pct = 0.05
bull_error_rate_threshold = 0.25
sideways_error_rate_threshold = 0.20
bear_error_rate_threshold = 0.10

[risk]
risk_per_trade_pct = 0.01
stop_loss_pct = 0.03
take_profit_pct = 0.08
max_daily_loss_pct = 0.03
max_concurrent_positions = 3
trailing_stop_pct = 0.0
atr_stop_multiplier = 2.0
min_entry_confidence = 0.45
partial_tp_pct = 0.5
cooldown_bars = 3
max_position_pct = 0.10

[kill_switch]
max_portfolio_drawdown_pct = 0.08
max_daily_loss_pct = 0.03
max_consecutive_losses = 3
max_strategy_drawdown_pct = 0.06
cooldown_minutes = 120

[backtest]
initial_capital = 5_700_000.0
fee_rate = 0.0005
slippage_pct = 0.0005

[telegram]
# Set via environment variables (never commit real tokens):
#   export CT_TELEGRAM_BOT_TOKEN="123456:ABC-DEF..."
#   export CT_TELEGRAM_CHAT_ID="-100123456789"
# When both are set, alerts are sent for: trade fills, kill switch triggers,
# drawdown warnings, order rejections, errors, daemon restarts, daily PnL.
bot_token = ""
chat_id = ""

[macro]
enabled = true
base_url = "http://127.0.0.1:8000"
timeout_seconds = 5.0

[runtime]
log_level = "INFO"
poll_interval_seconds = 60
max_iterations = 0
daemon_mode = true
auto_restart_enabled = true
restart_backoff_seconds = 15
max_restart_attempts = 0
network_recovery_backoff_seconds = 15
daemon_alert_cooldown_seconds = 300
healthcheck_path = "artifacts/health.json"
runtime_checkpoint_path = "artifacts/runtime-checkpoint.json"
backtest_baseline_path = "artifacts/backtest-baseline.json"
regime_report_path = "artifacts/regime-report.json"
drift_calibration_path = "artifacts/drift-calibration.json"
operator_report_path = "artifacts/operator-report.md"
strategy_run_journal_path = "artifacts/strategy-runs.jsonl"
paper_trade_journal_path = "artifacts/paper-trades.jsonl"
position_snapshot_path = "artifacts/positions.json"
daily_performance_path = "artifacts/daily-performance.json"
drift_report_path = "artifacts/drift-report.json"
promotion_gate_path = "artifacts/promotion-gate.json"
daily_memo_path = "artifacts/daily-memo.md"
strategy_report_path = "artifacts/strategy-report.md"

# === TIER 1: Primary compounders ===

# momentum_sol_wallet: 90d Sharpe 1.08, Return +0.78%, Trades 29 — kept as mid-tier compounder
[[wallets]]
name = "momentum_sol_wallet"
strategy = "momentum"
initial_capital = 1_100_000.0
symbols = ["KRW-SOL"]
[wallets.strategy_overrides]
momentum_lookback = 15
momentum_entry_threshold = 0.002
rsi_period = 14
rsi_overbought = 72.0
max_holding_bars = 36
adx_threshold = 20.0
volume_filter_mult = 1.2
[wallets.risk_overrides]
stop_loss_pct = 0.03
take_profit_pct = 0.08
risk_per_trade_pct = 0.015
partial_tp_pct = 0.5
max_concurrent_positions = 2
max_position_pct = 0.10

# momentum_eth_wallet: 90d Sharpe 0.67, Return +0.24%, Trades 35 — trimmed on low ROI
[[wallets]]
name = "momentum_eth_wallet"
strategy = "momentum"
initial_capital = 450_000.0
symbols = ["KRW-ETH"]
[wallets.strategy_overrides]
momentum_lookback = 15
momentum_entry_threshold = 0.003
rsi_period = 14
rsi_overbought = 70.0
max_holding_bars = 36
adx_threshold = 15.0
volume_filter_mult = 1.0
[wallets.risk_overrides]
stop_loss_pct = 0.02
take_profit_pct = 0.04
risk_per_trade_pct = 0.015
atr_stop_multiplier = 3.0
partial_tp_pct = 0.5
max_concurrent_positions = 2

# vpin_sol_wallet: 90d Sharpe 1.97, Return +1.64%, Trades 37 — highest active ROI, primary capital sink
[[wallets]]
name = "vpin_sol_wallet"
strategy = "vpin"
initial_capital = 2_500_000.0
symbols = ["KRW-SOL"]
[wallets.strategy_overrides]
rsi_period = 14
momentum_lookback = 10
max_holding_bars = 36
vpin_low_threshold = 0.45
vpin_high_threshold = 0.75
vpin_momentum_threshold = 0.0005
vpin_rsi_ceiling = 78.0
vpin_rsi_floor = 22.0
bucket_count = 20
[wallets.risk_overrides]
stop_loss_pct = 0.02
take_profit_pct = 0.04
risk_per_trade_pct = 0.015
atr_stop_multiplier = 3.0
partial_tp_pct = 0.5
max_concurrent_positions = 2

# === TIER 2: Satellite winners / capped specialists ===

# volspike_btc_wallet: 90d Sharpe 3.40, Return +1.03%, Trades 7 — boosted on ROI, still capped for low sample
[[wallets]]
name = "volspike_btc_wallet"
strategy = "volume_spike"
initial_capital = 1_300_000.0
symbols = ["KRW-BTC"]
[wallets.strategy_overrides]
spike_mult = 3.0
volume_window = 20
min_body_ratio = 0.3
momentum_lookback = 12
rsi_period = 14
rsi_overbought = 72.0
max_holding_bars = 36
adx_threshold = 20.0
[wallets.risk_overrides]
stop_loss_pct = 0.03
take_profit_pct = 0.08
risk_per_trade_pct = 0.01
partial_tp_pct = 0.5

# vpin_eth_wallet: 90d Sharpe 0.53, Return +0.23%, Trades 25 — trimmed on low ROI
[[wallets]]
name = "vpin_eth_wallet"
strategy = "vpin"
initial_capital = 350_000.0
symbols = ["KRW-ETH"]
[wallets.strategy_overrides]
rsi_period = 14
momentum_lookback = 10
max_holding_bars = 36
vpin_low_threshold = 0.45
vpin_high_threshold = 0.75
vpin_momentum_threshold = 0.0005
vpin_rsi_ceiling = 78.0
vpin_rsi_floor = 22.0
bucket_count = 20
[wallets.risk_overrides]
